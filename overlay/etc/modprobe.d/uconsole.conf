# Hardware-specific module configuration for ClockworkPi uConsole CM5
# Fallback install paths for out-of-tree modules in /var/lib/modules-overlay/

# Load AXP PMIC drivers early for regulator sequencing
softdep panel_cwu50 pre: axp20x_i2c axp20x_regulator

# Backlight driver
install ocp8178_bl /sbin/modprobe --ignore-install ocp8178_bl || /sbin/insmod /var/lib/modules-overlay/ocp8178_bl.ko

# Display drivers
install drm_rp1_dsi /sbin/modprobe --ignore-install drm_rp1_dsi || /sbin/insmod /var/lib/modules-overlay/drm-rp1-dsi.ko
install panel_cwu50 /sbin/modprobe --ignore-install panel_cwu50 || /sbin/insmod /var/lib/modules-overlay/panel-cwu50.ko

# RP1 audio output driver
install snd_soc_rp1_aout /sbin/modprobe --ignore-install snd_soc_rp1_aout || /sbin/insmod /var/lib/modules-overlay/snd-soc-rp1-aout.ko

# uconsole_fixup — only needed with old overlays lacking DT battery/adc nodes
install uconsole_fixup /sbin/insmod /var/lib/modules-overlay/uconsole_fixup.ko
